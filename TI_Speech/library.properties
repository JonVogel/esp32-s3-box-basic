name=TI_Speech
version=0.1.0
author=Jon Vogel
maintainer=Jon Vogel
sentence=TMS5220 LPC-10 speech synthesizer + TI Speech Synthesizer vocabulary ROM bake.
paragraph=Embeddable TMS5220 core ported from MAME (BSD-3-Clause) for use as an audio voice. Pair with the user-supplied spchrom.bin baked via extract.py into a PROGMEM speech_rom.h to recreate the TI-99/4A Speech Synthesizer cartridge's vocabulary on host hardware. The synth itself has no hardware dependency; the ROM bake is Box-3-host-specific only in that it expects Arduino's pgm_read_byte() macros.
category=Other
architectures=esp32
includes=tms5220.h
